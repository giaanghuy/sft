services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: student_management_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: student_management
      MYSQL_USER: student_user
      MYSQL_PASSWORD: student_password
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/database.sql:/docker-entrypoint-initdb.d/database.sql:ro
    networks:
      - student_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PHP + Apache Web Server Service
  web:
    build: .
    container_name: student_management_web
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - student_network
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
      - DB_HOST=db
      - DB_NAME=student_management
      - DB_USER=student_user
      - DB_PASS=student_password
    # Entrypoint script sẽ tự động chạy init_users.php và start Apache

volumes:
  db_data:
    driver: local

networks:
  student_network:
    driver: bridge

